
<style>
  @import url('https://fonts.cdnfonts.com/css/neue-machina');
  @import url('https://fonts.googleapis.com/css2?family=Garet:wght@400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  #game-wrap {
    font-family: 'Garet', sans-serif;
    background: #fff5f5;
    position: relative;
    width: 100%;
    height: 520px;
    overflow: hidden;
    cursor: crosshair;
    user-select: none;
  }

  /* mesh bg */
  #game-wrap::before {
    content:'';
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 55% 55% at 75% 35%, #f5d0e8bb 0%, transparent 65%),
      radial-gradient(ellipse 50% 50% at 18% 65%, #d8c9f5bb 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 10%, #f9e8cb66 0%, transparent 55%);
    pointer-events:none;
  }

  #canvas {
    position:absolute; inset:0;
    width:100%; height:100%;
  }

  /* name display */
  #name-display {
    position:absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    pointer-events: none;
    z-index: 10;
  }
  .big-brace {
    font-family: 'Neue Machina', sans-serif;
    font-size: 56px; font-weight: 300;
    color: #9d84c9; line-height:1;
    margin-top: 4px;
    transition: opacity 0.3s;
  }
  .name-rows { text-align: left; }
  .name-row {
    display: flex; gap: 4px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .letter-slot {
    font-family: 'Neue Machina', sans-serif;
    font-size: clamp(36px, 6vw, 58px);
    font-weight: 800;
    color: transparent;
    -webkit-text-stroke: 1.5px rgba(157,132,201,0.35);
    transition: color 0.35s ease, -webkit-text-stroke 0.35s ease, transform 0.35s ease;
    display: inline-block;
    letter-spacing: -1px;
  }
  .letter-slot.space { width: 18px; }
  .letter-slot.revealed {
    color: #1a1018;
    -webkit-text-stroke: 0px transparent;
    transform: scale(1.08);
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn {
    from { transform: scale(0.5) rotate(-8deg); opacity:0; }
    to   { transform: scale(1.08) rotate(0deg); opacity:1; }
  }

  /* subtitle & tag */
  #sub-text {
    position:absolute;
    bottom: 110px; left:50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none; z-index:10;
    opacity: 0; transition: opacity 0.8s;
  }
  #sub-text.show { opacity: 1; }
  #sub-text p {
    font-size:12px; font-weight:700;
    letter-spacing:3px; text-transform:uppercase;
    color: #9d84c9; margin-bottom:6px;
  }
  #sub-text h2 {
    font-family:'Neue Machina',sans-serif;
    font-size:13px; font-weight:800;
    letter-spacing:2px; color:#888;
    text-transform:uppercase;
  }

  /* score / instruction */
  #hud {
    position:absolute; top:16px; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding: 0 20px; z-index:20; pointer-events:none;
  }
  #score-box {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(157,132,201,0.2);
    border-radius: 100px; padding: 6px 16px;
    font-size:13px; font-weight:700; color:#9d84c9;
  }
  #instruction {
    font-size:12px; font-weight:700; color:#bbb;
    letter-spacing:0.5px;
    transition: opacity 0.5s;
  }

  /* win screen */
  #win-screen {
    position:absolute; inset:0; z-index:30;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px;
    background: rgba(255,245,245,0.6);
    backdrop-filter: blur(12px);
    opacity:0; pointer-events:none;
    transition: opacity 0.6s;
  }
  #win-screen.show { opacity:1; pointer-events:all; }
  #win-screen p {
    font-size:13px; font-weight:700; color:#9d84c9;
    letter-spacing:2px; text-transform:uppercase;
  }
  #win-screen h2 {
    font-family:'Neue Machina',sans-serif;
    font-size:28px; font-weight:800;
    color:#1a1018; letter-spacing:-1px;
  }
  #replay-btn {
    margin-top:8px;
    background:#9d84c9; color:white; border:none;
    padding:11px 28px; border-radius:100px;
    font-family:'Garet',sans-serif; font-size:13px; font-weight:700;
    cursor:pointer; letter-spacing:0.5px;
    transition: transform 0.2s, background 0.2s;
  }
  #replay-btn:hover { background:#6b55a8; transform:translateY(-2px); }
</style>

<div id="game-wrap">
  <canvas id="canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="score-box">✦ <span id="score-val">0</span> hits</div>
    <div id="instruction">shoot the sparkles ✦ to spell your name</div>
  </div>

  <!-- Name slots -->
  <div id="name-display">
    <span class="big-brace">{</span>
    <div class="name-rows" id="name-rows"></div>
  </div>

  <!-- Subtitle (shown when complete) -->
  <div id="sub-text">
    <p>✦ unlocked ✦</p>
    <h2>Cybersecurity &amp; Full-Stack Dev</h2>
  </div>

  <!-- Win overlay -->
  <div id="win-screen">
    <p>✦ name revealed ✦</p>
    <h2>Angelina Sprague</h2>
    <button id="replay-btn">Play Again</button>
  </div>
</div>

<script>
const NAME = "ANGELINA SPRAGUE"
const COLORS = ['#9d84c9','#f79bc7','#f3cc98','#b8a8e0','#f5b8d8']

const canvas = document.getElementById('canvas')
const ctx    = canvas.getContext('2d')
const wrap   = document.getElementById('game-wrap')
const scoreEl= document.getElementById('score-val')
const instrEl= document.getElementById('instruction')
const subText= document.getElementById('sub-text')
const winScr = document.getElementById('win-screen')

let W, H, sparkles=[], bullets=[], particles=[], score=0
let revealed=[], totalLetters=0, gameOver=false, mouse={x:0,y:0}

// ── Build name slots ───────────────────────────────────────────────────────
const nameRows = document.getElementById('name-rows')
const words = NAME.split(' ')
let slotEls = []   // flat array matching NAME chars, skipping spaces

words.forEach((word, wi) => {
  const row = document.createElement('div')
  row.className = 'name-row'
  word.split('').forEach(ch => {
    const s = document.createElement('span')
    s.className = 'letter-slot'
    s.textContent = ch
    s.dataset.ch = ch
    row.appendChild(s)
    slotEls.push(s)
  })
  if (wi < words.length - 1) {
    const sp = document.createElement('span')
    sp.className = 'letter-slot space'
    row.appendChild(sp)
  }
  nameRows.appendChild(row)
})

// letters to collect (no spaces, unique)
const lettersNeeded = [...new Set(NAME.replace(/ /g,'').split(''))]
totalLetters = lettersNeeded.length
revealed = new Array(totalLetters).fill(false)

// map letter → slot elements
function revealLetter(ch) {
  const idx = lettersNeeded.indexOf(ch)
  if (idx === -1 || revealed[idx]) return false
  revealed[idx] = true
  slotEls.forEach(el => {
    if (el.dataset.ch === ch) el.classList.add('revealed')
  })
  return true
}

// ── Resize ─────────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width  = wrap.clientWidth
  H = canvas.height = wrap.clientHeight
}
resize()
window.addEventListener('resize', resize)

// ── Sparkle targets ────────────────────────────────────────────────────────
function spawnSparkle() {
  const unrevealed = lettersNeeded.filter((_, i) => !revealed[i])
  if (!unrevealed.length) return
  const ch = unrevealed[Math.floor(Math.random() * unrevealed.length)]
  const margin = 60
  return {
    x: margin + Math.random() * (W - margin*2),
    y: margin + Math.random() * (H - margin - 180),
    ch,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    size: 14 + Math.random() * 10,
    vx: (Math.random() - 0.5) * 0.7,
    vy: (Math.random() - 0.5) * 0.7,
    spin: 0,
    spinV: (Math.random() - 0.5) * 0.04,
    pulse: Math.random() * Math.PI * 2,
    alive: true,
    opacity: 0,   // fade in
  }
}

function initSparkles() {
  sparkles = []
  const count = Math.min(lettersNeeded.length, 9)
  for (let i = 0; i < count; i++) {
    const s = spawnSparkle()
    if (s) { s.opacity = 0; sparkles.push(s) }
  }
}

// ── Bullets ────────────────────────────────────────────────────────────────
function shoot(mx, my) {
  if (gameOver) return
  // origin = center bottom of canvas
  const ox = W / 2, oy = H - 20
  const dx = mx - ox, dy = my - oy
  const len = Math.hypot(dx, dy)
  const speed = 14
  bullets.push({ x: ox, y: oy, vx: dx/len*speed, vy: dy/len*speed, r: 4, alive: true })
}

// ── Particles ──────────────────────────────────────────────────────────────
function burst(x, y, color, ch) {
  for (let i = 0; i < 18; i++) {
    const angle = (Math.PI*2/18)*i + Math.random()*0.3
    const speed = 2 + Math.random()*4
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      r: 2 + Math.random()*3,
      color,
      alpha: 1,
      life: 0.7 + Math.random()*0.3,
      decay: 0.025 + Math.random()*0.015,
      text: Math.random() < 0.3 ? ch : null,
      textAlpha: 1,
    })
  }
  // floating letter
  particles.push({
    x, y, vx: 0, vy: -2.5, r: 0, color,
    alpha: 1, life: 1, decay: 0.012,
    text: ch, big: true, textAlpha: 1,
  })
}

// ── Draw sparkle star ──────────────────────────────────────────────────────
function drawStar(cx, cy, r, spin, color, alpha, ch, size) {
  ctx.save()
  ctx.globalAlpha = alpha
  ctx.translate(cx, cy)
  ctx.rotate(spin)

  // 4-point star
  ctx.beginPath()
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI/4)*i
    const rad = i%2===0 ? r : r*0.38
    i===0 ? ctx.moveTo(Math.cos(angle)*rad, Math.sin(angle)*rad)
           : ctx.lineTo(Math.cos(angle)*rad, Math.sin(angle)*rad)
  }
  ctx.closePath()
  ctx.fillStyle = color
  ctx.shadowColor = color
  ctx.shadowBlur = 10
  ctx.fill()

  // letter inside
  ctx.shadowBlur = 0
  ctx.fillStyle = 'white'
  ctx.font = `700 ${Math.max(9, size*0.55)}px 'Neue Machina', sans-serif`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText(ch, 0, 0)

  ctx.restore()
}

// ── Draw shooter at bottom center ─────────────────────────────────────────
function drawShooter() {
  const x = W/2, y = H - 18
  // aim line
  const dx = mouse.x - x, dy = mouse.y - y
  const len = Math.hypot(dx, dy)
  if (len > 0) {
    ctx.save()
    ctx.strokeStyle = 'rgba(157,132,201,0.25)'
    ctx.setLineDash([4,8])
    ctx.lineWidth = 1
    ctx.beginPath()
    ctx.moveTo(x, y)
    ctx.lineTo(x + dx/len*60, y + dy/len*60)
    ctx.stroke()
    ctx.setLineDash([])
    ctx.restore()
  }
  // cannon
  ctx.save()
  ctx.translate(x, y)
  ctx.fillStyle = '#9d84c9'
  ctx.beginPath()
  ctx.arc(0, 0, 10, 0, Math.PI*2)
  ctx.fill()
  ctx.fillStyle = '#6b55a8'
  ctx.beginPath()
  ctx.arc(0, 0, 5, 0, Math.PI*2)
  ctx.fill()
  ctx.restore()
}

// ── Check win ──────────────────────────────────────────────────────────────
function checkWin() {
  if (revealed.every(Boolean)) {
    gameOver = true
    subText.classList.add('show')
    setTimeout(() => winScr.classList.add('show'), 900)
    instrEl.style.opacity = '0'
  }
}

// ── Main loop ──────────────────────────────────────────────────────────────
let frame = 0
function loop() {
  requestAnimationFrame(loop)
  ctx.clearRect(0, 0, W, H)
  frame++

  if (gameOver) {
    // still draw particles
    particles.forEach(p => { updateParticle(p); drawParticle(p) })
    particles = particles.filter(p => p.alpha > 0.02)
    return
  }

  // spawn more sparkles if needed
  const aliveCount = sparkles.filter(s => s.alive).length
  const unrevealed = lettersNeeded.filter((_, i) => !revealed[i]).length
  if (aliveCount < Math.min(unrevealed, 7) && frame % 40 === 0) {
    const s = spawnSparkle()
    if (s) sparkles.push(s)
  }

  // update & draw sparkles
  sparkles.forEach(s => {
    if (!s.alive) return
    s.x += s.vx; s.y += s.vy
    s.spin += s.spinV
    s.pulse += 0.05
    s.opacity = Math.min(1, s.opacity + 0.04)
    const r = s.size * (1 + 0.08 * Math.sin(s.pulse))

    // bounce walls
    if (s.x < 40 || s.x > W-40) s.vx *= -1
    if (s.y < 40 || s.y > H-160) s.vy *= -1

    drawStar(s.x, s.y, r, s.spin, s.color, s.opacity, s.ch, s.size)
  })
  sparkles = sparkles.filter(s => s.alive)

  // update & draw bullets
  bullets.forEach(b => {
    if (!b.alive) return
    b.x += b.vx; b.y += b.vy
    if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) { b.alive=false; return }

    // hit test sparkles
    sparkles.forEach(s => {
      if (!s.alive || !b.alive) return
      const dist = Math.hypot(b.x - s.x, b.y - s.y)
      if (dist < s.size + b.r) {
        b.alive = false
        s.alive = false
        const newReveal = revealLetter(s.ch)
        if (newReveal) {
          score++
          scoreEl.textContent = score
          burst(s.x, s.y, s.color, s.ch)
          checkWin()
        } else {
          // already had it — small burst
          burst(s.x, s.y, '#ddd', '✦')
        }
      }
    })

    // draw bullet
    ctx.save()
    ctx.fillStyle = '#9d84c9'
    ctx.shadowColor = '#9d84c9'
    ctx.shadowBlur = 8
    ctx.beginPath()
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2)
    ctx.fill()
    ctx.restore()
  })
  bullets = bullets.filter(b => b.alive)

  // particles
  particles.forEach(p => { updateParticle(p); drawParticle(p) })
  particles = particles.filter(p => p.alpha > 0.02)

  // shooter
  drawShooter()
}

function updateParticle(p) {
  p.x += p.vx; p.y += p.vy
  p.vy += 0.06
  p.alpha -= p.decay
}
function drawParticle(p) {
  if (!p.text) {
    ctx.save()
    ctx.globalAlpha = Math.max(0, p.alpha)
    ctx.fillStyle = p.color
    ctx.beginPath()
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2)
    ctx.fill()
    ctx.restore()
  } else {
    ctx.save()
    ctx.globalAlpha = Math.max(0, p.alpha)
    ctx.fillStyle = p.color
    ctx.font = p.big
      ? `800 28px 'Neue Machina', sans-serif`
      : `700 14px 'Neue Machina', sans-serif`
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText(p.text, p.x, p.y)
    ctx.restore()
  }
}

// ── Input ──────────────────────────────────────────────────────────────────
wrap.addEventListener('mousemove', e => {
  const r = wrap.getBoundingClientRect()
  mouse.x = e.clientX - r.left
  mouse.y = e.clientY - r.top
})
wrap.addEventListener('click', e => {
  const r = wrap.getBoundingClientRect()
  shoot(e.clientX - r.left, e.clientY - r.top)
})
wrap.addEventListener('touchstart', e => {
  e.preventDefault()
  const r = wrap.getBoundingClientRect()
  const t = e.touches[0]
  shoot(t.clientX - r.left, t.clientY - r.top)
}, { passive: false })

// replay
document.getElementById('replay-btn').addEventListener('click', () => {
  gameOver = false
  score = 0
  scoreEl.textContent = '0'
  bullets = []; particles = []
  revealed = new Array(totalLetters).fill(false)
  slotEls.forEach(el => el.classList.remove('revealed'))
  subText.classList.remove('show')
  winScr.classList.remove('show')
  instrEl.style.opacity = '1'
  initSparkles()
})

// ── Go ─────────────────────────────────────────────────────────────────────
initSparkles()
loop()
</script>
